app:
  name: shop_api
  host: 0.0.0.0
  port: 8686
  mode: debug
  upload_path: ./uploads
  server_url: http://localhost:8686
  jwt_secret: your-jwt-secret-key-change-in-production
  jwt_expire: 72

database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: root1234
  dbname: shop_db
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret
  mchid: your-wechat-mchid
  apikey: your-wechat-apikey
  cert_path: ./cert/wechat_apiclient_cert.pem
  key_path: ./cert/wechat_apiclient_key.pem
  notify_url: http://your-domain.com/api/notify/wechat

alipay:
  appid: your-alipay-appid
  private_key: your-alipay-private-key
  public_key: alipay-public-key
  notify_url: http://your-domain.com/api/notify/alipay

logistics:
  provider: kuaidi100  # kuaidi100/aliyun
  api_key: ""  # 快递100 API Key，留空则使用模拟数据
  customer: ""  # 快递100 Customer ID

cors:
  allow_origins:
    - "http://localhost:8686"
    - "http://localhost:5173"
    - "http://localhost:8000"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - "*"
